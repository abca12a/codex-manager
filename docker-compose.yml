services:
  codex-register:
    build: .
    container_name: codex-register
    ports:
      - "${APP_PORT:-1455}:${APP_PORT:-1455}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - APP_HOST=0.0.0.0
      - APP_PORT=${APP_PORT:-1455}
      - APP_ACCESS_PASSWORD=${APP_ACCESS_PASSWORD:-admin123}
      - DEBUG=0
      - LOG_LEVEL=info
      # - APP_DATABASE_URL=postgresql://user:password@db:5432/codex
      # - HTTP_PROXY=http://your-proxy:port
      # - HTTPS_PROXY=http://your-proxy:port
    env_file:
      - path: .env
        required: false
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os, urllib.request; urllib.request.urlopen(f"http://127.0.0.1:{os.environ.get('APP_PORT','1455')}/", timeout=5).read()
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
